name: Keep-Alive Ping

on:
  workflow_dispatch: {}
  schedule:
    # Every 5 min, offset by 2 to dodge the top-of-hour surge
    - cron: "2,7,12,17,22,27,32,37,42,47,52,57 * * * *"

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping endpoint
        run: |
          URL="https://svc-c6848ae1-kl-caa1669c-caa1669c.kubeletto.app"

          for i in 1 2 3; do
            status=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 10 \
              -H "User-Agent: keep-alive-bot/1.0" \
              "$URL") || status="000"
            echo "$(date -u +%H:%M:%S) Ping $i — HTTP $status"
            [ "$i" -lt 3 ] && sleep 2
          done

          # Don't fail on 403 — endpoint is alive, just rejecting
          if [ "$status" = "000" ]; then
            echo "::warning::Endpoint unreachable"
            exit 1
          fi
