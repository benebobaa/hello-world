name: Keep-Alive Ping

on:
  workflow_dispatch:
  schedule:
    # Every 5 minutes — keeps endpoint warm without burning CI minutes
    - cron: "*/5 * * * *"

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2  # short-lived, just a quick burst
    steps:
      - name: Ping endpoint
        run: |
          URL="https://svc-c6848ae1-kl-caa1669c-caa1669c.kubeletto.app"

          # 3 quick pings with 2s gap — enough to keep the connection alive
          for i in 1 2 3; do
            status=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$URL" || echo "FAIL")
            echo "$(date -u +%H:%M:%S) Ping $i — HTTP $status"
            [ "$i" -lt 3 ] && sleep 2
          done
