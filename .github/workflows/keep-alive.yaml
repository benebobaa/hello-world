name: Keep-Alive Ping

on:
  workflow_dispatch: {}
  schedule:
    # Every 5 min, offset by 2 to dodge the top-of-hour surge
    - cron: "2,7,12,17,22,27,32,37,42,47,52,57 * * * *"

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping endpoint
        run: |
          URL="https://svc-c6848ae1-kl-caa1669c-caa1669c.kubeletto.app"
          success=0

          for i in 1 2 3; do
            status=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 15 \
              --retry 2 \
              --retry-delay 3 \
              -H "User-Agent: keep-alive-bot/1.0" \
              "$URL") || status="000"
            echo "$(date -u +%H:%M:%S) Ping $i — HTTP $status"
            [ "$status" != "000" ] && success=1
            [ "$i" -lt 3 ] && sleep 5
          done

          if [ "$success" -eq 1 ]; then
            echo "✅ Endpoint is alive"
          else
            echo "::warning::All pings returned 000 — endpoint may be blocking GitHub IPs (Cloudflare)"
            # Don't fail — Cloudflare intermittently blocks CI runners
            # The schedule will retry in 5 min anyway
          fi
